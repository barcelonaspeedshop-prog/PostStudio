version: '3.8'

services:
  app:
    build: .
    ports:
      - '3000:3000'
    volumes:
      - poststudio_data:/data
    environment:
      # App
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://app.premirafirst.com}
      TOKEN_STORAGE_PATH: /data

      # Anthropic
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # Google OAuth (shared by YouTube + Drive)
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET}
      YOUTUBE_REDIRECT_URI: ${YOUTUBE_REDIRECT_URI}
      # The PostStudio channel whose OAuth token manages all Brand Account channels.
      # All YouTube uploads use this account's token regardless of target channel.
      YOUTUBE_MASTER_CHANNEL: "Gentlemen of Fuel"

      # Google Drive image library root folder
      GOOGLE_DRIVE_FOLDER_ID: 1wtB_6-2kTfPs7fnvo905MCw7Qr5Gk--Z

      # Service account key for Drive API access (mounted via the data volume)
      GOOGLE_SERVICE_ACCOUNT_KEY_FILE: /data/service-account.json

      # Meta (Facebook / Instagram) — app credentials for token exchange
      META_APP_ID: "915633637891649"
      META_APP_SECRET: ${META_APP_SECRET}

      # Image search (Serper)
      SERPER_API_KEY: ${SERPER_API_KEY}

      # Music for video export (path inside the container)
      MUSIC_FOLDER: ${MUSIC_FOLDER:-/data/music}

      # ElevenLabs (optional — voice-over generation)
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}

    restart: unless-stopped

volumes:
  poststudio_data:
    driver: local
