version: '3.8'

services:
  app:
    build: .
    ports:
      - '3000:3000'
    volumes:
      - /docker/poststudio/data:/data
      - /docker/poststudio/music:/data/music
    environment:
      # App
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://app.premirafirst.com}
      TOKEN_STORAGE_PATH: /data

      # Anthropic
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # Google Drive image library root folder
      GOOGLE_DRIVE_FOLDER_ID: 1wtB_6-2kTfPs7fnvo905MCw7Qr5Gk--Z

      # Service account key for Drive API access (mounted via the data volume)
      GOOGLE_SERVICE_ACCOUNT_KEY_FILE: /data/service-account.json

      # Meta (Facebook / Instagram) — app credentials for token exchange
      META_APP_ID: "915633637891649"
      META_APP_SECRET: ${META_APP_SECRET}

      # Image search (Serper)
      SERPER_API_KEY: ${SERPER_API_KEY}

      # Pexels stock photos (for long-form video builder)
      PEXELS_API_KEY: ${PEXELS_API_KEY}

      # OpenAI (DALL-E fallback for long-form video builder)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

      # Music for video export (path inside the container)
      MUSIC_FOLDER: ${MUSIC_FOLDER:-/data/music}

      # ElevenLabs (optional — voice-over generation)
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}

      # Preview token for pending article previews on premirafirst.com
      PREVIEW_TOKEN: ${PREVIEW_TOKEN:-}

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.poststudio.rule=Host(`app.premirafirst.com`)"
      - "traefik.http.routers.poststudio.entrypoints=websecure"
      - "traefik.http.routers.poststudio.tls.certresolver=letsencrypt"
      - "traefik.http.services.poststudio.loadbalancer.server.port=3000"
    restart: unless-stopped

volumes:
  poststudio_data:
    driver: local
